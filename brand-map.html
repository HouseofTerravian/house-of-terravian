async function sha256(msg) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// Place nodes within their cluster
function layoutNodes() {
  const clusterNodes = {};
  NODES.forEach(n => {
    if (!clusterNodes[n.cluster]) clusterNodes[n.cluster] = [];
    clusterNodes[n.cluster].push(n);
  });

  Object.entries(clusterNodes).forEach(([cluster, nodes]) => {
    const center = clusterPos[cluster];
    if (nodes.length === 1) {
      nodes[0].x = center.x;
      nodes[0].y = center.y;
      return;
    }
    // First node at center, rest in a ring
    const mainNode = nodes[0];
    mainNode.x = center.x;
    mainNode.y = center.y;

    const rest = nodes.slice(1);
    const ringR = 90 + rest.length * 12;
    rest.forEach((n, i) => {
      const angle = (2 * Math.PI * i / rest.length) - Math.PI / 2;
      n.x = center.x + Math.cos(angle) * ringR;
      n.y = center.y + Math.sin(angle) * ringR;
    });
  });
}

  // Compute bounding radius
  let maxDist = 0;
  nodesInCluster.forEach(n => {
    const d = Math.sqrt((n.x - pos.x) ** 2 + (n.y - pos.y) ** 2) + n.r;
    if (d > maxDist) maxDist = d;
  });

  const halo = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  halo.setAttribute('cx', pos.x);
  halo.setAttribute('cy', pos.y);
  halo.setAttribute('r', maxDist + 30);
  halo.setAttribute('fill', clusterDef.color);
  halo.setAttribute('fill-opacity', '0.04');
  halo.setAttribute('stroke', clusterDef.color);
  halo.setAttribute('stroke-opacity', '0.12');
  halo.setAttribute('stroke-width', '1');
  halo.setAttribute('stroke-dasharray', '6 4');
  svg.appendChild(halo);

  // Cluster label
  const lbl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  lbl.setAttribute('x', pos.x);
  lbl.setAttribute('y', pos.y - maxDist - 14);
  lbl.setAttribute('text-anchor', 'middle');
  lbl.setAttribute('fill', clusterDef.color);
  lbl.setAttribute('fill-opacity', '0.5');
  lbl.setAttribute('font-size', '11');
  lbl.setAttribute('font-weight', '600');
  lbl.setAttribute('letter-spacing', '1.5');
  lbl.textContent = clusterDef.label.toUpperCase();
  svg.appendChild(lbl);
});

// Edges
EDGES.forEach(e => {
  const from = nodeMap[e.from];
  const to = nodeMap[e.to];
  if (!from || !to) return;

  const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  line.setAttribute('x1', from.x);
  line.setAttribute('y1', from.y);
  line.setAttribute('x2', to.x);
  line.setAttribute('y2', to.y);

  const sameCluster = from.cluster === to.cluster;
  const color = sameCluster ? CLUSTERS[from.cluster].color : '#555';
  line.setAttribute('stroke', color);
  line.setAttribute('stroke-opacity', sameCluster ? '0.35' : '0.2');
  line.setAttribute('stroke-width', sameCluster ? '1.5' : '1');
  line.classList.add('edge');

  if (!sameCluster) {
    line.setAttribute('stroke-dasharray', '4 3');
  }
  svg.appendChild(line);

  // Edge label
  if (e.label) {
    const mx = (from.x + to.x) / 2;
    const my = (from.y + to.y) / 2;
    const lbl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    lbl.setAttribute('x', mx);
    lbl.setAttribute('y', my - 4);
    lbl.setAttribute('text-anchor', 'middle');
    lbl.setAttribute('fill', '#666');
    lbl.setAttribute('fill-opacity', '0.6');
    lbl.setAttribute('font-size', '7.5');
    lbl.textContent = e.label;
    svg.appendChild(lbl);
  }
});

// Nodes
const tooltip = document.getElementById('tooltip');

NODES.forEach(n => {
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.classList.add('node');

  const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  circle.setAttribute('cx', n.x);
  circle.setAttribute('cy', n.y);
  circle.setAttribute('r', n.r);
  circle.setAttribute('fill', CLUSTERS[n.cluster].color);
  circle.setAttribute('fill-opacity', '0.2');
  circle.setAttribute('stroke', CLUSTERS[n.cluster].color);
  circle.setAttribute('stroke-width', '2');
  g.appendChild(circle);

  // Multi-line label
  const lines = n.label.split('\n');
  lines.forEach((line, i) => {
    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    text.setAttribute('x', n.x);
    text.setAttribute('y', n.y + (i - (lines.length - 1) / 2) * 11);
    text.setAttribute('text-anchor', 'middle');
    text.setAttribute('dominant-baseline', 'central');
    text.setAttribute('fill', '#e0e0e0');
    text.setAttribute('font-size', n.r > 18 ? '10' : '8.5');
    text.setAttribute('font-weight', n.r > 20 ? '700' : '500');
    text.textContent = line;
    g.appendChild(text);
  });

  // Tooltip
  g.addEventListener('mouseenter', (ev) => {
    tooltip.style.display = 'block';
    tooltip.querySelector('.tt-name').textContent = n.label.replace(/\n/g, ' ');
    tooltip.querySelector('.tt-type').textContent = CLUSTERS[n.cluster].label;
    tooltip.querySelector('.tt-desc').textContent = n.desc;
  });
  g.addEventListener('mousemove', (ev) => {
    tooltip.style.left = (ev.clientX + 16) + 'px';
    tooltip.style.top = (ev.clientY - 10) + 'px';
  });
  g.addEventListener('mouseleave', () => {
    tooltip.style.display = 'none';
  });

  svg.appendChild(g);
});

// Legend
const legendEl = document.getElementById('legend');
Object.entries(CLUSTERS).forEach(([key, cl]) => {
  const count = NODES.filter(n => n.cluster === key).length;
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `<span class="legend-dot" style="background:${cl.color}"></span> ${cl.label} (${count})`;
  legendEl.appendChild(item);
});
</script>
</body>
</html>
